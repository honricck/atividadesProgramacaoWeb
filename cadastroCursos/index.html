<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cadastro de Cursos - IFC</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

    <header class="main-header">
        <div class="logo-container">
            <img src="Logo_IFC_horizontal.png" alt="Logo IFC" class="logo-ifc">
            <h1 class="title-system">Cadastro de Cursos</h1>
        </div>
    </header>

    <nav class="navbar">
        <a href="index.html" class="active">Cadastro de Cursos</a>
        <a href="../cadastroProfessores/index.html">Cadastro de Professores</a>
    </nav>

    <main class="content-container">

        <div class="action-bar">
            <button class="btn-ifc" onclick="abrirModalCadastro()">Adicionar Curso</button>
        </div>

        <table class="table-ifc">
            <thead>
                <tr>
                    <th>Nome do Curso</th>
                    <th>Sigla</th>
                    <th>Coordenador</th>
                    <th style="width: 180px;">Ações</th>
                </tr>
            </thead>
            <tbody id="tbodyCursos">
            </tbody>
        </table>
    </main>

    <div id="modalCurso" class="modal-overlay">
        <div class="modal-content">
            <div class="modal-header">
                <h2 id="modalTitle">Adicionar/Editar Curso</h2>
                <span class="close-btn" onclick="fecharModal()">&times;</span>
            </div>

            <form id="cursoForm">
                <div class="form-group">
                    <label for="nome">Nome do Curso:</label>
                    <input type="text" id="nome" required>
                </div>
                <div class="form-group">
                    <label for="sigla">Sigla:</label>
                    <input type="text" id="sigla" required>
                </div>
                <div class="form-group">
                    <label for="coordenador">Coordenador:</label>
                    <input type="text" id="coordenador" required>
                </div>
                <div class="form-group">
                    <label for="descricao">Descrição:</label>
                    <textarea id="descricao" rows="4" required></textarea>
                </div>

                <button type="submit" class="btn-submit-modal">Salvar</button>
            </form>
        </div>
    </div>

    <script src="script.js"></script>
</body>

</html>
